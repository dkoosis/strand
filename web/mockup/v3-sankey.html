<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>strand · release flow</title>
<link rel="preconnect" href="https://fonts.bunny.net">
<link href="https://fonts.bunny.net/css?family=geist:400,500,600,700|geist-mono:400,500" rel="stylesheet">
<style>
/* ============================================================
   strand · release-gate spike — Sankey (§1a)
   The chart nobody else has. The `blocks` DAG, layered:
   upstream blockers → release members → the release bead.
   A release is ready only when no open blocker remains.
   Shares the forest tokens; color = status signal only.
   ============================================================ */
:root {
  --fs-9: 11px; --fs-8: 12px; --fs-base: 13px;
  --fs-2: 14px; --fs-3: 16px; --fs-4: 18px; --fs-5: 22px; --fs-6: 28px; --fs-7: 38px;
  --lh-tight: 1.2; --lh: 1.45;
  --s-1: 2px; --s-2: 4px; --s-3: 6px; --s-4: 8px; --s-5: 12px;
  --s-6: 16px; --s-7: 20px; --s-8: 24px; --s-9: 32px; --s-10: 48px;
  --p0: #e5484d; --p1: #d99030; --p2: #4c7ef0; --p3: #7c8290; --p4: #5a606c;
  --st-open: #4c7ef0; --st-prog: #d99030; --st-blocked: #e5484d;
  --st-closed: #46a758; --st-deferred: #6b7280;
  font-synthesis: none; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
}
:root[data-theme="dark"] {
  --bg: #0c0d10; --bg-1: #121317; --bg-2: #16181d; --sel: #1b2333;
  --line: #20232b; --line-2: #2a2e38;
  --ink: #e7e9ee; --ink-2: #b3b8c4; --ink-3: #6c7280; --ink-4: #474c57;
  --chip-ink: #0c0d10; --focus: #4c7ef0;
  --card: #14161b; --card-hi: #181b21;
}
:root[data-theme="light"] {
  --bg: #fbfbfa; --bg-1: #ffffff; --bg-2: #f4f4f2; --sel: #eaf0fd;
  --line: #e9e9e5; --line-2: #dcdcd6;
  --ink: #1a1c20; --ink-2: #4a4f59; --ink-3: #898f9b; --ink-4: #c2c6cd;
  --chip-ink: #ffffff; --focus: #2f6bdd;
  --card: #ffffff; --card-hi: #fafaf8;
  --p2: #2f6bdd; --st-open: #2f6bdd; --st-closed: #2f9e4d;
}
* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0; background: var(--bg); color: var(--ink);
  font-family: "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
  font-size: var(--fs-base); line-height: var(--lh);
  font-feature-settings: "cv01", "cv11", "ss03";
  display: flex; flex-direction: column; overflow: hidden;
}
.mono { font-family: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace; }
.tnum { font-variant-numeric: tabular-nums; }

/* ============================================================ header */
header {
  display: flex; align-items: center; gap: var(--s-6);
  height: 44px; padding: 0 var(--s-7); border-bottom: 1px solid var(--line);
  background: var(--bg-1); flex: 0 0 auto; z-index: 5;
}
.brand { font-weight: 600; font-size: var(--fs-2); letter-spacing: .14em; text-transform: lowercase; }
.brand::after {
  content: ""; display: inline-block; width: 5px; height: 5px; margin-left: 7px;
  vertical-align: middle; border-radius: 50%; background: var(--p2);
}
.repo {
  display: inline-flex; align-items: center; gap: var(--s-3);
  padding: var(--s-2) var(--s-3); border: 0; background: none; color: var(--ink);
  font: inherit; font-weight: 500; cursor: pointer; border-radius: 4px;
}
.repo:hover { background: var(--bg-2); }
.repo .caret { color: var(--ink-3); font-size: var(--fs-9); }
.spacer { flex: 1; }
.icon-btn {
  display: grid; place-items: center; width: 28px; height: 28px; border: 0;
  background: none; color: var(--ink-3); cursor: pointer; border-radius: 6px;
}
.icon-btn:hover { background: var(--bg-2); color: var(--ink); }

/* ============================================================ gate masthead */
.masthead {
  padding: var(--s-5) var(--s-10); border-bottom: 1px solid var(--line);
  background: var(--bg-1); flex: 0 0 auto;
  display: flex; align-items: center; gap: var(--s-8);
}
.gate-id {
  display: flex; flex-direction: column; gap: var(--s-2);
}
.gate-eyebrow {
  font-size: var(--fs-9); letter-spacing: .16em; text-transform: uppercase;
  color: var(--ink-3); font-weight: 600;
}
.gate-name { font-size: var(--fs-5); font-weight: 600; letter-spacing: -.015em; }
/* verdict pill — the readiness gate, the whole point */
.verdict {
  display: inline-flex; align-items: center; gap: var(--s-3);
  padding: var(--s-3) var(--s-5); border-radius: 999px; font-weight: 600;
  font-size: var(--fs-8); letter-spacing: .02em;
}
.verdict .vd { width: 8px; height: 8px; border-radius: 50%; }
.verdict.blocked { color: var(--st-blocked); background: color-mix(in srgb, var(--st-blocked) 13%, transparent); }
.verdict.blocked .vd { background: var(--st-blocked); }
.verdict.ready { color: var(--st-closed); background: color-mix(in srgb, var(--st-closed) 13%, transparent); }
.verdict.ready .vd { background: var(--st-closed); }
.gate-meta { display: flex; gap: var(--s-8); margin-left: auto; color: var(--ink-3); font-size: var(--fs-8); }
.gate-meta b { color: var(--ink); font-weight: 600; font-variant-numeric: tabular-nums; }

/* ============================================================ flow canvas */
.canvas { flex: 1; overflow: hidden; padding: var(--s-5) var(--s-8) var(--s-6);
  display: flex; flex-direction: column; min-height: 0; }
.col-heads {
  display: flex; padding: 0 var(--s-2) var(--s-3); flex: 0 0 auto;
  font-size: var(--fs-9); letter-spacing: .1em; text-transform: uppercase;
  color: var(--ink-3); font-weight: 600;
}
.col-heads span { flex: 1; }
.col-heads span:last-child { text-align: right; }
.col-heads span.mid { text-align: center; }
.sankey { flex: 1; width: 100%; min-height: 0; }

/* ============================================================ legend / footer */
footer {
  flex: 0 0 auto; padding: var(--s-3) var(--s-10); border-top: 1px solid var(--line);
  background: var(--bg-1); color: var(--ink-4); font-size: var(--fs-9);
  display: flex; align-items: center; gap: var(--s-6);
}
footer b { color: var(--ink-3); font-weight: 500; }
.legend { display: flex; gap: var(--s-6); align-items: center; }
.legend i { display: inline-flex; align-items: center; gap: var(--s-3); font-style: normal; color: var(--ink-3); }
.legend .sw { width: 9px; height: 9px; border-radius: 2px; }
</style>
</head>
<body>
<header>
  <span class="brand">strand</span>
  <button class="repo"><span>trixi</span><span class="caret">▾</span></button>
  <span class="spacer"></span>
  <button class="repo"><span>release · v1.0</span><span class="caret">▾</span></button>
  <button class="icon-btn" id="theme" title="Toggle theme">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg>
  </button>
</header>

<div class="masthead">
  <div class="gate-id">
    <div class="gate-eyebrow">Release gate</div>
    <div class="gate-name">v1.0 · coach ships</div>
  </div>
  <span class="verdict" id="verdict"></span>
  <div class="gate-meta">
    <span><b id="m-members">0</b> members</span>
    <span><b id="m-blockers">0</b> open blockers</span>
    <span><b id="m-work">0</b> open beads upstream</span>
  </div>
</div>

<div class="canvas">
  <div class="col-heads">
    <span>Upstream blockers <span style="text-transform:none;letter-spacing:0;color:var(--ink-4)">— what must clear first</span></span>
    <span class="mid">Release members</span>
    <span>The release</span>
  </div>
  <div class="sankey" id="sankey"></div>
</div>

<footer>
  <span><b>Flow = </b> the <code class="mono">blocks</code> DAG · width ∝ open work</span>
  <div class="legend" style="margin-left:auto">
    <i><span class="sw" style="background:var(--st-blocked)"></span>blocked</i>
    <i><span class="sw" style="background:var(--st-prog)"></span>in progress</i>
    <i><span class="sw" style="background:var(--st-open)"></span>open</i>
    <i><span class="sw" style="background:var(--st-closed)"></span>done</i>
  </div>
</footer>

<script src="vendor/echarts.min.js"></script>
<script>
const $ = s => document.querySelector(s);
const cssVar = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();

/* ----------------------------------------------------------------
   Spike data: one release, its members (blocks → release), and each
   member's upstream blockers (blocks → member). Subsystems span the
   spine — a release is cross-cutting by design. `open` = remaining
   open beads under that node; it's the width that flows downstream.
   ---------------------------------------------------------------- */
const RELEASE = {
  id: 'rel-v1', name: 'v1.0 · coach ships',
  members: [
    { id: 'trixi-26gj', name: 'Live body-context reasoning', sub: 'WETWARE', status: 'in_progress', open: 3,
      blockers: [
        { id: 'trixi-1uej', name: 'Body-metrics ingest + surface', sub: 'WETWARE', status: 'open', open: 5 },
      ] },
    { id: 'trixi-s86v', name: 'Wetware toolkit v1', sub: 'WETWARE', status: 'open', open: 4,
      blockers: [
        { id: 'trixi-t6eq', name: 'Self-toolset + discoverability', sub: 'COLLAB', status: 'open', open: 2 },
      ] },
    { id: 'trixi-apiguard', name: 'Graceful API degradation', sub: 'RETRIEVAL', status: 'open', open: 2,
      blockers: [
        { id: 'trixi-8odw', name: 'Telemetry + error signal quality', sub: 'RETRIEVAL', status: 'open', open: 3 },
      ] },
    { id: 'trixi-43a1', name: 'mnemosyne feature delta', sub: 'MEMORY', status: 'open', open: 4,
      blockers: [
        { id: 'trixi-7ty', name: 'Nug rewrite product features', sub: 'MEMORY', status: 'open', open: 3 },
        { id: 'trixi-zvt', name: 'Consolidation proposal flow', sub: 'MEMORY', status: 'closed', open: 0 },
      ] },
  ],
};

const STATUS_COLOR = {
  open: cssVar('--st-open'), in_progress: cssVar('--st-prog'),
  blocked: cssVar('--st-blocked'), closed: cssVar('--st-closed'), deferred: cssVar('--st-deferred'),
};

// Flatten the release tree into Sankey nodes + links.
// depth 0 = blockers, depth 1 = members, depth 2 = release.
function build() {
  const nodes = [], links = [];
  const node = (id, name, sub, status, depth) =>
    nodes.push({ name: id, label: name, sub, status, depth,
      itemStyle: { color: STATUS_COLOR[status] || cssVar('--ink-3') } });
  const link = (from, to, value, status) =>
    links.push({ source: from, target: to, value: Math.max(value, 0.6),
      lineStyle: { color: STATUS_COLOR[status] || cssVar('--ink-3') } });

  let memberOpen = 0, blockerOpen = 0, openBlockers = 0;
  node(RELEASE.id, RELEASE.name, '', 'open', 2);
  for (const m of RELEASE.members) {
    const upstream = m.blockers.reduce((s, b) => s + b.open, 0);
    node(m.id, m.name, m.sub, m.status, 1);
    link(m.id, RELEASE.id, m.open + upstream, m.status);
    memberOpen += m.open;
    for (const b of m.blockers) {
      node(b.id, b.name, b.sub, b.status, 0);
      link(b.id, m.id, b.open, b.status);
      blockerOpen += b.open;
      if (b.status !== 'closed') openBlockers++;
    }
  }
  return { nodes, links, memberOpen, blockerOpen, openBlockers };
}

const G = build();
const blocked = G.openBlockers > 0;

// gate verdict + readout
$('#verdict').className = 'verdict ' + (blocked ? 'blocked' : 'ready');
$('#verdict').innerHTML = `<span class="vd"></span>${blocked ? 'BLOCKED' : 'READY TO SHIP'}`;
$('#m-members').textContent = RELEASE.members.length;
$('#m-blockers').textContent = G.openBlockers;
$('#m-work').textContent = G.memberOpen + G.blockerOpen;

let chart;
function option() {
  return {
    backgroundColor: 'transparent',
    tooltip: {
      trigger: 'item',
      backgroundColor: cssVar('--bg-1'), borderColor: cssVar('--line-2'),
      textStyle: { color: cssVar('--ink'), fontSize: 12 },
      formatter: p => {
        if (p.dataType === 'edge') {
          const t = nodeByName(p.data.target), s = nodeByName(p.data.source);
          return `<b>${s.label}</b><br><span style="color:${cssVar('--ink-3')}">blocks → ${t.label}</span><br>${p.data.value} open upstream`;
        }
        const d = p.data;
        const sub = d.sub ? `<span style="color:${cssVar('--ink-3')}">${d.sub} · </span>` : '';
        return `${sub}<b>${d.label}</b><br><span style="color:${STATUS_COLOR[d.status]}">${d.status.replace('_',' ')}</span>`;
      },
    },
    series: [{
      type: 'sankey', left: 8, right: 8, top: 6, bottom: 6,
      nodeWidth: 16, nodeGap: 14, draggable: false,
      emphasis: { focus: 'adjacency' },
      data: G.nodes,
      links: G.links,
      label: {
        color: cssVar('--ink'), fontSize: 12, fontFamily: 'Geist',
        formatter: p => p.data.label, overflow: 'truncate', width: 150,
      },
      itemStyle: { borderWidth: 0 },
      lineStyle: { color: 'source', opacity: 0.34, curveness: 0.5 },
    }],
  };
}
const nodeByName = n => G.nodes.find(x => x.name === n);

function render() {
  const el = $('#sankey');
  if (!chart) chart = echarts.init(el, null, { renderer: 'canvas' });
  // status colors are theme-dependent — recompute on every render
  for (const k in STATUS_COLOR) STATUS_COLOR[k] = cssVar('--st-' + (k === 'in_progress' ? 'prog' : k));
  for (const nd of G.nodes) nd.itemStyle.color = STATUS_COLOR[nd.status] || cssVar('--ink-3');
  for (const lk of G.links) {
    const s = nodeByName(lk.source);
    lk.lineStyle.color = STATUS_COLOR[s.status] || cssVar('--ink-3');
  }
  chart.setOption(option());
  chart.resize();
}

$('#theme').onclick = () => {
  const r = document.documentElement;
  r.dataset.theme = r.dataset.theme === 'dark' ? 'light' : 'dark';
  render();
};

render();
let rt; addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(() => chart && chart.resize(), 120); });
</script>
</body>
</html>
