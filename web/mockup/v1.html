<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>strand · the forest</title>
<link rel="preconnect" href="https://fonts.bunny.net">
<link href="https://fonts.bunny.net/css?family=geist:400,500,600,700|geist-mono:400,500" rel="stylesheet">
<style>
/* ============================================================
   strand · forest spike — model A (treemap navigator + bead list)
   The treemap is a compact NAVIGATOR (top-left), not the screen.
   Module = region (heading carries the region color). Epic = tile
   sized by its open beads. Pick a region/tile → beads on the right
   → a bead → detail drawer. Color = signal; structure on gray.
   ============================================================ */
:root {
  --fs-9: 11px; --fs-8: 12px; --fs-base: 13px;
  --fs-2: 14px; --fs-3: 16px; --fs-4: 18px; --fs-5: 22px; --fs-6: 28px;
  --lh-tight: 1.2; --lh: 1.45;
  --s-1: 2px; --s-2: 4px; --s-3: 6px; --s-4: 8px; --s-5: 12px;
  --s-6: 16px; --s-7: 20px; --s-8: 24px; --s-9: 32px; --s-10: 48px;
  --p0: #e5484d; --p1: #d99030; --p2: #4c7ef0; --p3: #7c8290; --p4: #5a606c;
  --st-open: #4c7ef0; --st-prog: #d99030; --st-blocked: #e5484d;
  --st-closed: #46a758; --st-deferred: #6b7280;
  font-synthesis: none; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
}
:root[data-theme="dark"] {
  --bg: #0c0d10; --bg-1: #121317; --bg-2: #16181d; --sel: #1b2333;
  --line: #20232b; --line-2: #2a2e38;
  --ink: #e7e9ee; --ink-2: #b3b8c4; --ink-3: #6c7280; --ink-4: #474c57;
  --chip-ink: #0c0d10; --focus: #4c7ef0;
  --card: #14161b; --card-hi: #181b21;
  --tile-mix: 22%; --hdr-mix: 88%;     /* region color blends */
}
:root[data-theme="light"] {
  --bg: #fbfbfa; --bg-1: #ffffff; --bg-2: #f4f4f2; --sel: #eaf0fd;
  --line: #e9e9e5; --line-2: #dcdcd6;
  --ink: #1a1c20; --ink-2: #4a4f59; --ink-3: #898f9b; --ink-4: #c2c6cd;
  --chip-ink: #ffffff; --focus: #2f6bdd;
  --card: #ffffff; --card-hi: #fafaf8;
  --tile-mix: 14%; --hdr-mix: 82%;
  --p2: #2f6bdd; --st-open: #2f6bdd; --st-closed: #2f9e4d;
}
* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0; background: var(--bg); color: var(--ink);
  font-family: "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
  font-size: var(--fs-base); line-height: var(--lh);
  font-feature-settings: "cv01", "cv11", "ss03";
  display: flex; flex-direction: column; overflow: hidden;
}
.mono { font-family: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace; }
.tnum { font-variant-numeric: tabular-nums; }

/* ============================================================ header */
header {
  display: flex; align-items: center; gap: var(--s-5);
  height: 44px; padding: 0 var(--s-7); border-bottom: 1px solid var(--line);
  background: var(--bg-1); flex: 0 0 auto; z-index: 5;
}
.brand { font-weight: 600; font-size: var(--fs-2); letter-spacing: .14em; text-transform: lowercase; }
.brand::after {
  content: ""; display: inline-block; width: 5px; height: 5px; margin-left: 7px;
  vertical-align: middle; border-radius: 50%; background: var(--p2);
}
.repo {
  display: inline-flex; align-items: center; gap: var(--s-3);
  padding: var(--s-2) var(--s-3); border: 0; background: none; color: var(--ink);
  font: inherit; font-weight: 500; cursor: pointer; border-radius: 4px;
}
.repo:hover { background: var(--bg-2); }
.repo .caret { color: var(--ink-3); font-size: var(--fs-9); }
.spacer { flex: 1; }
.search { position: relative; width: 220px; }
.search input {
  width: 100%; height: 28px; padding: 0 var(--s-5) 0 26px; background: var(--bg-2);
  border: 1px solid transparent; border-radius: 6px; color: var(--ink); font: inherit;
}
.search input::placeholder { color: var(--ink-3); }
.search svg { position: absolute; left: 8px; top: 7px; color: var(--ink-3); }
.icon-btn {
  display: grid; place-items: center; width: 28px; height: 28px; border: 0;
  background: none; color: var(--ink-3); cursor: pointer; border-radius: 6px;
}
.icon-btn:hover { background: var(--bg-2); color: var(--ink); }

/* ============================================================ masthead — north star keystone */
.masthead {
  padding: var(--s-5) var(--s-7); border-bottom: 1px solid var(--line);
  background: var(--bg-1); flex: 0 0 auto;
  display: flex; align-items: baseline; gap: var(--s-8);
}
.ns-left { min-width: 0; }
.ns-label {
  font-size: var(--fs-9); letter-spacing: .16em; text-transform: uppercase;
  color: var(--ink-3); font-weight: 600; margin-bottom: var(--s-2);
}
.ns-label::before { content: "★ "; color: var(--p1); }
.northstar {
  font-size: var(--fs-4); font-weight: 600; line-height: 1.25; letter-spacing: -.012em;
  max-width: 78ch; color: var(--ink);
}
.northstar em { color: var(--ink-3); font-style: normal; font-weight: 500; }
.ns-meta { margin-left: auto; display: flex; gap: var(--s-7); color: var(--ink-3); font-size: var(--fs-8); white-space: nowrap; }
.ns-meta b { color: var(--ink); font-weight: 600; }

/* ============================================================ split: navigator | beads */
.split { flex: 1; display: grid; grid-template-columns: minmax(420px, 46fr) 54fr; min-height: 0; }
.nav-pane { border-right: 1px solid var(--line); display: flex; flex-direction: column; min-width: 0; min-height: 0; }
.list-pane { display: flex; flex-direction: column; min-width: 0; min-height: 0; background: var(--bg-1); }

/* pane heads */
.pane-head {
  display: flex; align-items: center; gap: var(--s-4);
  padding: var(--s-5) var(--s-6); border-bottom: 1px solid var(--line); flex: 0 0 auto;
}
.pane-title { font-size: var(--fs-9); letter-spacing: .1em; text-transform: uppercase; color: var(--ink-3); font-weight: 600; }
/* group-by selector — inert slot (future: module | release | …) */
.groupby {
  display: inline-flex; align-items: center; gap: var(--s-2); margin-left: auto;
  padding: var(--s-2) var(--s-4); border: 1px solid var(--line-2); border-radius: 6px;
  background: var(--bg-2); color: var(--ink-2); font-size: var(--fs-8); cursor: pointer;
}
.groupby .k { color: var(--ink-3); }
.groupby .caret { color: var(--ink-4); font-size: var(--fs-9); }
.groupby[aria-disabled] { opacity: .8; }

/* ============================================================ treemap navigator */
.tmwrap { flex: 1; padding: var(--s-5); min-height: 0; overflow: auto; }
.treemap { position: relative; width: 100%; height: 100%; min-height: 360px; }
/* a module region — no chrome; tint + gap carry the grouping */
.region {
  position: absolute; overflow: hidden;
  background: transparent;
  display: flex; flex-direction: column;
}
.rg-head {
  flex: 0 0 auto; display: flex; align-items: baseline; gap: var(--s-3);
  padding: 4px var(--s-4); cursor: pointer; min-width: 0;
  background: color-mix(in srgb, var(--rc) var(--tile-mix), var(--card));
  color: var(--ink); margin-bottom: 1.5px;
}
.rg-head .nm { font-weight: 700; font-size: var(--fs-9); letter-spacing: .06em; text-transform: uppercase;
  color: color-mix(in srgb, var(--rc) 70%, var(--ink));
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rg-head .ct { margin-left: auto; font-size: var(--fs-9); font-weight: 600; color: var(--ink-2); font-variant-numeric: tabular-nums; }
.region.sel .rg-head { color: var(--ink); }
.region.sel .rg-head .nm { color: color-mix(in srgb, var(--rc) 92%, var(--ink)); }
/* epic tiles inside a region */
.rg-body { position: relative; flex: 1; min-height: 0; }
/* tile = pure data: a count (scaled to its size) + an optional flag. Nothing else.
   Identity is on hover, in the hint bar. */
.tile {
  position: absolute; overflow: hidden; cursor: pointer;
  background: color-mix(in srgb, var(--rc) var(--tile-mix), var(--card));
  transition: background .1s;
}
.tile:hover { background: color-mix(in srgb, var(--rc) calc(var(--tile-mix) + 16%), var(--card)); }
.tile.sel { background: color-mix(in srgb, var(--rc) calc(var(--tile-mix) + 26%), var(--card)); }
/* count anchored to a corner — same spot in every tile */
.tile .to { position: absolute; left: 5px; bottom: 3px;
  font-size: var(--fs-8); color: var(--ink-3); font-weight: 500; font-variant-numeric: tabular-nums; line-height: 1; }
/* escalation flag — epic holds active P0/P1 work. Square = its own category
   (vs status circles, priority chips). Red = urgent. Presence only. */
.flag { position: absolute; top: 3px; right: 3px; width: 6px; height: 6px; background: var(--p0); }

/* hint bar — fixed size, fixed location; the hovered tile's identity reads here */
.hintbar {
  flex: 0 0 auto; height: 48px; padding: 0 var(--s-6);
  border-bottom: 1px solid var(--line); display: flex; flex-direction: column; justify-content: center;
  gap: 1px; overflow: hidden;
}
.hint-name { font-size: var(--fs-3); font-weight: 600; color: var(--ink); letter-spacing: -.01em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hint-meta { font-size: var(--fs-8); color: var(--ink-3); display: flex; align-items: center; gap: var(--s-3); white-space: nowrap; }
.hint-meta .d { width: 8px; height: 8px; border-radius: 2px; flex: 0 0 auto; }
.hint-meta .esc { color: var(--p0); font-weight: 600; }
.hintbar.idle .hint-name { color: var(--ink-4); font-weight: 500; font-size: var(--fs-2); }
.hintbar.idle .hint-meta { display: none; }

/* ============================================================ bead list (right) */
.lp-scope { display: flex; align-items: center; gap: var(--s-3); min-width: 0; }
.lp-dot { width: 9px; height: 9px; border-radius: 3px; flex: 0 0 auto; background: var(--rc, var(--p2)); }
.lp-name { font-weight: 600; font-size: var(--fs-2); color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lp-sub { color: var(--ink-3); font-size: var(--fs-8); }
.lp-stat { margin-left: auto; display: flex; gap: var(--s-6); color: var(--ink-3); font-size: var(--fs-8); white-space: nowrap; }
.lp-stat b { color: var(--ink); font-weight: 600; }
.list-body { flex: 1; overflow: auto; min-height: 0; }
.epic-group { border-bottom: 1px solid var(--line); }
.eg-head {
  position: sticky; top: 0; z-index: 1; display: flex; align-items: baseline; gap: var(--s-3);
  padding: var(--s-3) var(--s-6); background: var(--bg-2);
  font-size: var(--fs-9); letter-spacing: .04em; text-transform: uppercase; color: var(--ink-3); font-weight: 600;
  border-bottom: 1px solid var(--line); cursor: pointer;
}
.eg-head .eo { margin-left: auto; color: var(--ink-2); font-variant-numeric: tabular-nums; }
.eg-head:hover { color: var(--ink); }
table { width: 100%; border-collapse: collapse; }
tbody td { padding: 0 var(--s-4); height: 33px; border-bottom: 1px solid var(--line); vertical-align: middle; white-space: nowrap; color: var(--ink-2); }
tbody tr { cursor: pointer; }
tbody tr:hover td { background: var(--bg-2); }
.r-id { color: var(--ink-4); font-size: var(--fs-9); font-family: "Geist Mono", monospace; width: 92px; padding-left: var(--s-6) !important; }
.r-pri { width: 26px; }
.pchip { display: inline-block; width: 20px; text-align: center; font-size: 10px; font-weight: 600;
  border-radius: 3px; color: var(--chip-ink); font-variant-numeric: tabular-nums; }
.p0 { background: var(--p0); } .p1 { background: var(--p1); } .p2 { background: var(--p2); }
.p3 { background: var(--p3); color: #fff; } .p4 { background: var(--p4); color: #fff; }
.r-title { color: var(--ink); font-size: var(--fs-2); font-weight: 500; max-width: 0; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.r-type { width: 64px; color: var(--ink-3); font-size: var(--fs-8); }
.r-stat { width: 116px; padding-right: var(--s-6) !important; }
.status { display: inline-flex; align-items: center; gap: var(--s-3); font-size: var(--fs-8); color: var(--ink-2); }
.dot { width: 7px; height: 7px; border-radius: 50%; flex: 0 0 auto; }
.dot.open { background: var(--st-open); } .dot.in_progress { background: var(--st-prog); }
.dot.closed { background: var(--st-closed); } .dot.deferred { background: var(--st-deferred); }
.dot.blocked { background: var(--st-blocked); }

/* ============================================================ bead detail drawer (next level) */
.scrim { position: fixed; inset: 0; background: rgba(0,0,0,.38); opacity: 0; pointer-events: none; transition: opacity .16s; z-index: 8; }
.scrim.show { opacity: 1; pointer-events: auto; }
.drawer {
  position: fixed; top: 0; right: 0; bottom: 0; width: 460px; max-width: 92vw;
  background: var(--bg-1); border-left: 1px solid var(--line-2); z-index: 9;
  transform: translateX(100%); transition: transform .2s cubic-bezier(.4,0,.2,1);
  display: flex; flex-direction: column; box-shadow: -20px 0 60px rgba(0,0,0,.35);
}
.drawer.show { transform: none; }
.dr-head { padding: var(--s-7) var(--s-7) var(--s-6); border-bottom: 1px solid var(--line); position: relative; }
.dr-eyebrow { display: flex; align-items: center; gap: var(--s-3); font-size: var(--fs-8); color: var(--ink-3); }
.dr-id { font-family: "Geist Mono", monospace; }
.dr-title { font-size: var(--fs-4); font-weight: 600; letter-spacing: -.01em; margin: var(--s-4) 0 0; line-height: 1.3; }
.dr-stat { display: flex; flex-wrap: wrap; gap: var(--s-3) var(--s-6); margin-top: var(--s-5); font-size: var(--fs-8); color: var(--ink-3); }
.dr-stat b { color: var(--ink); font-weight: 600; }
.dr-close { position: absolute; top: var(--s-5); right: var(--s-5); }
.dr-body { flex: 1; overflow: auto; padding: var(--s-6) var(--s-7); color: var(--ink-2); }
.dr-note { color: var(--ink-3); font-size: var(--fs-8); }

footer { flex: 0 0 auto; padding: var(--s-3) var(--s-7); border-top: 1px solid var(--line); background: var(--bg-1); color: var(--ink-4); font-size: var(--fs-9); display: flex; gap: var(--s-6); }
footer b { color: var(--ink-3); font-weight: 500; }
</style>
</head>
<body>
<header>
  <span class="brand">strand</span>
  <button class="repo"><span>trixi</span><span class="caret">▾</span></button>
  <span class="spacer"></span>
  <div class="search">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input name="q" placeholder="Search beads…">
  </div>
  <button class="icon-btn" id="theme" title="Toggle theme">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg>
  </button>
</header>

<div class="masthead">
  <div class="ns-left">
    <div class="ns-label">North star</div>
    <div class="northstar" id="northstar"></div>
  </div>
  <div class="ns-meta">
    <span><b id="m-mods">0</b> modules</span>
    <span><b class="tnum" id="m-open">0</b> open · <b class="tnum" id="m-prog">0</b> in progress</span>
  </div>
</div>

<div class="split">
  <!-- ░░ navigator ░░ -->
  <section class="nav-pane">
    <div class="pane-head">
      <span class="pane-title">The forest</span>
      <button class="groupby" aria-disabled="true" title="future: pivot the grouping — module · release · person">
        group by <span class="k">module</span><span class="caret">▾</span>
      </button>
    </div>
    <div class="hintbar idle" id="hintbar"><div class="hint-name">Hover a tile</div><div class="hint-meta"></div></div>
    <div class="tmwrap"><div class="treemap" id="treemap"></div></div>
  </section>

  <!-- ░░ beads ░░ -->
  <section class="list-pane">
    <div class="pane-head">
      <div class="lp-scope">
        <span class="lp-dot" id="lpDot"></span>
        <span class="lp-name" id="lpName">—</span>
        <span class="lp-sub" id="lpSub"></span>
      </div>
      <div class="lp-stat" id="lpStat"></div>
    </div>
    <div class="list-body" id="listBody"></div>
  </section>
</div>

<footer>
  <span><b>Pick a region or tile</b> → its beads list right</span>
  <span><b>Click a bead</b> → detail</span>
  <span style="margin-left:auto">forest spike · model A · tiles sized by live open beads · §1a/§4a</span>
</footer>

<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer">
  <div class="dr-head">
    <button class="icon-btn dr-close" id="drClose"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    <div class="dr-eyebrow"><span class="dr-id" id="drId"></span> · <span id="drType"></span></div>
    <div class="dr-title" id="drTitle"></div>
    <div class="dr-stat" id="drStat"></div>
  </div>
  <div class="dr-body" id="drBody"></div>
</aside>

<script src="forest2-data.js"></script>
<script>
const D = window.FOREST2;
const $ = s => document.querySelector(s);
const heatWord = h => h == null ? 'quiet' : (h <= 2 ? 'today' : (h <= 10 ? Math.round(h)+'d ago' : Math.round(h)+'d cold'));
const shortId = id => id.replace('trixi-','');

/* masthead */
$('#northstar').innerHTML = D.northstar.replace('remembers across sessions','<em>remembers across sessions</em>');
const allBeads = D.modules.flatMap(m=>m.epics).flatMap(e=>e.beads);
$('#m-mods').textContent = D.modules.length;
$('#m-open').textContent = allBeads.length;
$('#m-prog').textContent = allBeads.filter(b=>b.status==='in_progress').length;

/* ---- squarified treemap ---- */
function squarify(items, x, y, w, h) {
  const out = [], total = items.reduce((s,i)=>s+i.v, 0) || 1;
  let nodes = items.map(i => ({ ...i, area: i.v/total*(w*h) }));
  let rx=x, ry=y, rw=w, rh=h;
  const worst = (row,len) => { const s=row.reduce((a,b)=>a+b.area,0); const mx=Math.max(...row.map(r=>r.area)), mn=Math.min(...row.map(r=>r.area)); return Math.max(len*len*mx/(s*s), s*s/(len*len*mn)); };
  let i=0;
  while (i<nodes.length) {
    const horiz = rw<rh, len = horiz?rw:rh;
    let row=[nodes[i]];
    while (i+row.length<nodes.length) {
      const next=nodes[i+row.length];
      if (worst(row,len) >= worst([...row,next],len)) row.push(next); else break;
    }
    const rowArea=row.reduce((a,b)=>a+b.area,0), thick=rowArea/len;
    let off = horiz?rx:ry;
    for (const n of row) {
      const frac = n.area/rowArea*len;
      if (horiz) out.push({...n, x:off, y:ry, w:frac, h:thick});
      else       out.push({...n, x:rx, y:off, w:thick, h:frac});
      off += frac;
    }
    if (horiz){ ry+=thick; rh-=thick; } else { rx+=thick; rw-=thick; }
    i += row.length;
  }
  return out;
}

let SEL = { kind:'module', m:null, e:null };
const HEAD_H = 22, RG_GAP = 3, T_GAP = 1.5;

function renderTreemap() {
  const tm = $('#treemap'); tm.innerHTML='';
  tm.onmouseleave = idleHint;
  const W = tm.clientWidth, H = Math.max(tm.clientHeight, 360);
  const regions = squarify(D.modules.map(m=>({m, v:m.epic_open})), 0, 0, W, H);
  for (const rr of regions) {
    const m = rr.m;
    const reg = document.createElement('div');
    reg.className = 'region' + (SEL.m===m && SEL.kind==='module' ? ' sel' : '');
    reg.style.cssText = `--rc:${m.color};left:${rr.x+RG_GAP/2}px;top:${rr.y+RG_GAP/2}px;width:${rr.w-RG_GAP}px;height:${rr.h-RG_GAP}px`;
    const head = document.createElement('div');
    head.className = 'rg-head';
    head.innerHTML = `<span class="nm">${m.name}</span><span class="ct">${m.epic_open}</span>`;
    head.onclick = () => selectModule(m);
    reg.appendChild(head);
    const body = document.createElement('div'); body.className='rg-body';
    reg.appendChild(body); tm.appendChild(reg);
    // epics within region
    const bw = rr.w-RG_GAP, bh = rr.h-RG_GAP-HEAD_H;
    if (bh < 24) continue;
    const tiles = squarify(m.epics.map(e=>({e, v:e.open})), 0, 0, bw, bh);
    for (const tt of tiles) {
      const e = tt.e, tw = tt.w-T_GAP, th = tt.h-T_GAP;
      const el = document.createElement('div');
      el.className = 'tile' + (SEL.e===e?' sel':'');
      el.style.cssText = `left:${tt.x+T_GAP/2}px;top:${tt.y+T_GAP/2}px;width:${tw}px;height:${th}px`;
      const hot = e.beads.filter(b=>b.priority<=1);
      const flag = hot.length ? `<span class="flag"></span>` : '';
      el.innerHTML = `${flag}<div class="to">${e.open}</div>`;
      el.onmouseenter = () => showHint(m, e, hot.length);
      el.onclick = ev => { ev.stopPropagation(); selectEpic(m, e); };
      body.appendChild(el);
    }
  }
}
function cleanName(t){ return t.replace(/^\[epic\]\s*/i,'').replace(/^\(EPIC\)\s*/i,'').replace(/\s*\(.*\)\s*$/,''); }
// short legible hint — the head before the first separator; the full title lives in the panel + hover
function hint(t){ return cleanName(t).split(/\s*[—–:]\s*/)[0].trim(); }

/* hint bar — fixed readout; updates as you sweep the tiles */
const hb = () => document.getElementById('hintbar');
function showHint(m, e, esc){
  const bar = hb(); bar.classList.remove('idle');
  bar.querySelector('.hint-name').textContent = cleanName(e.name);
  bar.querySelector('.hint-meta').innerHTML =
    `<span class="d" style="background:${m.color}"></span>${m.name} · <b style="color:var(--ink-2)">${e.open}</b> open${esc?` · <span class="esc">${esc} escalated</span>`:''}`;
}
function idleHint(){ const bar=hb(); bar.classList.add('idle'); bar.querySelector('.hint-name').textContent='Hover a tile'; bar.querySelector('.hint-meta').innerHTML=''; }

/* ---- selection → bead list ---- */
function selectModule(m){ SEL={kind:'module', m, e:null}; renderTreemap(); renderList(); }
function selectEpic(m,e){ SEL={kind:'epic', m, e}; renderTreemap(); renderList(); }

function beadRow(b){
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="r-id">${shortId(b.id)}</td>
    <td class="r-pri"><span class="pchip p${b.priority}">${b.priority}</span></td>
    <td class="r-title">${b.title}</td>
    <td class="r-type">${b.type}</td>
    <td class="r-stat"><span class="status"><span class="dot ${b.status}"></span>${b.status.replace('_',' ')}</span></td>`;
  tr.onclick = () => openDrawer(b);
  return tr;
}

function renderList(){
  const m = SEL.m; const lb = $('#listBody'); lb.innerHTML='';
  document.documentElement.style.setProperty('--rc', m.color);
  $('#lpDot').style.background = m.color;
  const epics = SEL.kind==='epic' ? [SEL.e] : m.epics;
  const beads = epics.flatMap(e=>e.beads);
  $('#lpName').textContent = SEL.kind==='epic' ? cleanName(SEL.e.name) : m.name;
  $('#lpSub').textContent = SEL.kind==='epic' ? `in ${m.name}` : m.gloss;
  const ip = beads.filter(b=>b.status==='in_progress').length;
  $('#lpStat').innerHTML = `<span><b>${beads.length}</b> open beads</span>${ip?`<span><b>${ip}</b> in progress</span>`:''}<span>active <b>${heatWord(m.heat_days)}</b></span>`;
  for (const e of epics){
    const grp = document.createElement('div'); grp.className='epic-group';
    if (SEL.kind!=='epic'){
      const gh = document.createElement('div'); gh.className='eg-head';
      gh.innerHTML = `<span>${cleanName(e.name)}</span><span class="eo">${e.open}</span>`;
      gh.onclick = () => selectEpic(m, e);
      grp.appendChild(gh);
    }
    const tbl = document.createElement('table'); const tb = document.createElement('tbody');
    e.beads.forEach(b => tb.appendChild(beadRow(b)));
    tbl.appendChild(tb); grp.appendChild(tbl); lb.appendChild(grp);
  }
}

/* ---- bead detail drawer (next level) ---- */
function openDrawer(b){
  $('#drId').textContent = shortId(b.id);
  $('#drType').textContent = b.type;
  $('#drTitle').textContent = b.title;
  $('#drStat').innerHTML = `<span><span class="dot ${b.status}" style="display:inline-block;margin-right:5px"></span><b>${b.status.replace('_',' ')}</b></span><span>priority <b>P${b.priority}</b></span><span>${SEL.m.name}</span>`;
  $('#drBody').innerHTML = `<p class="dr-note">Bead detail — description, dependencies (blocks / blocked-by), comments, and the close/claim actions land here when wired. The spike carries identity + roll-up only.</p>`;
  $('#scrim').classList.add('show'); $('#drawer').classList.add('show');
}
function closeDrawer(){ $('#scrim').classList.remove('show'); $('#drawer').classList.remove('show'); }
$('#scrim').onclick = closeDrawer; $('#drClose').onclick = closeDrawer;
document.addEventListener('keydown', e => { if (e.key==='Escape') closeDrawer(); });

$('#theme').onclick = () => { const r=document.documentElement; r.dataset.theme = r.dataset.theme==='dark'?'light':'dark'; renderTreemap(); };

selectModule(D.modules[0]);
let rt; addEventListener('resize', () => { clearTimeout(rt); rt=setTimeout(renderTreemap,120); });
</script>
</body>
</html>
