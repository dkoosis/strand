# Strict lint for strand, adapted from ../trixi/.golangci.yml.
# Greenfield — tight from day one. depguard arch rules omitted until the
# package graph is worth fencing; re-add per-boundary rules as it grows.
version: "2"

run:
  modules-download-mode: readonly
  tests: true

linters:
  enable:
    # Error handling
    - err113
    - errchkjson
    - errorlint
    - nilerr
    - nilnesserr
    - wrapcheck

    # Safety
    - bodyclose
    - containedctx
    - forcetypeassert
    - gosec
    - noctx
    - predeclared
    - rowserrcheck
    - sqlclosecheck

    # Complexity
    - cyclop
    - funlen
    - gocognit
    - gocyclo
    - nestif

    # Enum & type safety
    - exhaustive
    - makezero
    - musttag
    - reassign

    # Style & correctness
    - asciicheck
    - copyloopvar
    - dupword
    - durationcheck
    - errname
    - exptostd
    - fatcontext
    - gocheckcompilerdirectives
    - gochecknoinits
    - goconst
    - gocritic
    - grouper
    - inamedparam
    - intrange
    - iotamixing
    - loggercheck
    - misspell
    - modernize
    - nakedret
    - nilnil
    - nolintlint
    - prealloc
    - recvcheck
    - revive
    - sloglint
    - unconvert
    - unparam
    - usestdlibvars
    - wastedassign

    # Performance
    - mirror
    - perfsprint

    # Testing
    - testifylint
    - thelper
    - usetesting

  disable:
    - godox
    - wsl

  settings:
    wrapcheck:
      # cachingSource transparently decorates the IssueSource interface; its
      # passthrough/memoize methods return the underlying error as-is (already
      # surfaced at the bd boundary). Re-wrapping a same-interface decorator
      # would only double-prefix, so exempt the decorated interface.
      ignore-interface-regexps:
        - IssueSource
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - fmt.Fprintf
        - fmt.Printf
        - fmt.Print
        - fmt.Println
        - fmt.Fprint
        - fmt.Fprintln
    goconst:
      min-len: 4
      min-occurrences: 5
      ignore-tests: true
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - commentFormatting
        - ifElseChain
    cyclop:
      max-complexity: 15
    funlen:
      lines: 80
      statements: 40
    gocognit:
      min-complexity: 15
    gocyclo:
      min-complexity: 15
    nestif:
      min-complexity: 5
    nakedret:
      max-func-lines: 20
    revive:
      severity: warning
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: bare-return
          disabled: true
        - name: var-naming
          disabled: false
        - name: context-as-argument
          disabled: false
        - name: error-return
          disabled: false
        - name: dot-imports
          disabled: false
        - name: waitgroup-by-value
          disabled: false
    staticcheck:
      checks:
        - all
    testifylint:
      enable-all: true
    nolintlint:
      require-explanation: true
      require-specific: true

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      # bd nests its worktrees inside the repo (strand-4fj/, strand-alg.2/, …);
      # each carries a copy of go.mod, so don't lint them as part of this module.
      - (^|/)strand-[^/]+/
    rules:
      # Test files: relax security, complexity, context, and wrapping.
      - linters:
          - gosec
          - cyclop
          - funlen
          - gocognit
          - gocyclo
          - nestif
          - noctx
          - unparam
          - wrapcheck
        path: _test\.go
      # cmd main.go: relax complexity; defer-in-main is idiomatic.
      - linters:
          - cyclop
          - funlen
          - gocognit
          - gocyclo
          - nestif
        path: cmd/.*/main\.go
      - linters:
          - gocritic
        path: cmd/.*/main\.go
        text: exitAfterDefer

formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
